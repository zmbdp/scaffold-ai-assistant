server:
  port: 18084

# ==================== Spring AI 框架配置 ====================
spring:
  web:
    client:
      # Spring RestClient 连接超时：建立 TCP 连接的最长等待时间
      # 作用范围：Spring AI DashScope 的 Embedding / Chat / Rerank 等同步 HTTP 请求
      connect-timeout: 30s
      # Spring RestClient 读取超时：等待服务端返回响应的最长时间
      # 作用范围：同上，Embedding 向量化大文本时需适当放宽
      read-timeout: 180s
  ai:
    # 通义千问模型配置（DashScope）
    dashscope:
      api-key: # 你的通义千问API Key
      chat:
        model: deepseek-v4-flash
        options:
          temperature: 0.7
      embedding:
        options:
          model: qwen3.7-text-embedding
      # 重排序模型配置
      # 配置前缀必须为 spring.ai.dashscope.rerank，由 DashScopeRerankAutoConfiguration 自动装配 RerankModel Bean
      rerank:
        options:
          model: qwen3-rerank
    # 多模型管理配置
    # 启动时由 ModelServiceImpl @PostConstruct 解析，为每个 enabled=true 的模型构建 ChatClient 实例
    # 注意：default-model 用 kebab-case，因为 "default" 是 Java 关键字不能直接作为字段名
    models:
      - type: TEXT_ONLY
        name: deepseek-v4-flash
        provider: dashscope
        enabled: true
        default-model: true
        capabilities: [TEXT]
      - type: TEXT_AND_IMAGE
        name: qwen-vl-max
        provider: dashscope
        enabled: true
        default-model: true
        capabilities: [TEXT, IMAGE]
    # Milvus 向量数据库配置（Spring AI 标准前缀）
    milvus:
      host: scaffold-ai-assistant-milvus
      port: 19530
      database-name: default
      collection-name: scaffold_knowledge
      # 输出维度
      embedding-dimension: 1024
      index-type: HNSW
      metric-type: IP
      index-parameters:
        efConstruction: 200
        M: 16
      query-parameters:
        efRuntime: 100
      # 维度不一致时是否自动重建集合（启动时检查现有集合维度，与配置不一致时自动 drop+重建）
      # 测试环境推荐 true：方便切换 Embedding 模型
      # 生产环境推荐 false：避免误删数据，由管理员手动处理
      auto-rebuild-on-dimension-mismatch: true

# ==================== RAG 检索参数配置 ====================
scaffold:
  rag:
    top-k: 5
    context-max-length: 8000
    memory-rounds: 5
    rerank-timeout: 5000
  tool:
    # 工具调用超时（秒）
    timeout: 30
  # 定时任务线程池配置
  scheduler:
    pool-size: 5
    thread-name-prefix: "scheduled-"

# ==================== 知识库路径配置（供 Agent 工具使用） ====================
# 容器内路径固定为 /knowledge（由根 pom 的 knowledge.path 属性配置，挂载宿主机 /opt/scaffold-ai-assistant/frameworkjava 到容器 /knowledge）
knowledge:
  # 根路径
  base-path: /knowledge
  # 路径白名单（Agent 工具调用时校验）
  allowed-paths:
    - /knowledge
  # 路径黑名单
  path-blacklist:
    - .git
    - /etc
    - /tmp
  # 单文件最大 10MB
  max-file-size: 10485760
  # ==================== 启动时自动知识同步 ====================
  # 服务启动完成后自动触发一次知识同步（异步执行，不阻塞启动；内部含 Redisson 分布式锁，多实例安全）
  startup-sync:
    # 是否启用启动时同步（true=启用，false=禁用）
    enabled: true
    # 是否强制全量同步（false=增量同步仅处理变更文件【推荐】；true=全量重新向量化）
    force: false
    # 启动同步前的等待时间（毫秒），等待 Milvus 集合加载和 Embedding 模型就绪
    delay-ms: 3000

# ==================== xxl-job 执行器配置（覆盖 share-xxljob-test.yaml） ====================
xxl:
  job:
    executor:
      appname: zmbdp-chat-service-executor
