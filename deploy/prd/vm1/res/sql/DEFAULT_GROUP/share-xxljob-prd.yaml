# XXL-JOB 执行器配置
xxl:
  job:
    admin:
      # 调度中心地址（多个地址用逗号分隔）
      # 如果业务服务也跑在同一个 Docker Compose 网络里，用 http://scaffold-ai-assistant-xxljob-admin:8080/xxl-job-admin
      # 如果业务服务跑在宿主机或其他网络，就填内网 IP + 8081
      addresses: http://你的云服务器1内网ip/你的虚拟机1内网ip:8081/xxl-job-admin
    executor:
      # 执行器 AppName（需与调度中心配置一致）
      appname: ${spring.application.name}-executor
      # 执行器注册地址（为空则自动获取 IP）
      address:
      # 执行器 IP（为空则自动获取）
      ip:
      # 执行器端口（-1 则自动获取可用端口）
      port: -1
      # 访问令牌（需与调度中心配置一致）
      accessToken: scaffold-ai-assistant_prd
      # 执行器日志路径
      logpath: /data/applogs/xxl-job/executor
      # 执行器日志保留天数（-1 永不清理）
      logretentiondays: 30

# 布隆过滤器 XXL-JOB 降级配置
bloom:
  filter:
    fallback:
      enabled: false
      cron: 0 0 4 * * ?