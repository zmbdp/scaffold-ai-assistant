version: '3.8'
#启动命令 docker compose -p scaffold-ai-assistant -f docker-compose-mid.yml up -d
services:
  scaffold-ai-assistant-mysql-master:
    container_name: scaffold-ai-assistant-mysql-master
    image: crpi-otuh3k08p4yxr3tv.cn-shanghai.personal.cr.aliyuncs.com/zmbdp-infra/mysql:8.4.2
    ports:
      - "3308:3306"
    volumes:
      # 数据挂载
      - ../data/scaffold-ai-assistantdata/mysql/data:/var/lib/mysql
      # 配置挂载
      - ./mysql/init/init.sql:/docker-entrypoint-initdb.d/init.sql
      - ./mysql/sql:/opt/sql
    command: [
      'mysqld',
      '--innodb-buffer-pool-size=80M',
      '--character-set-server=utf8mb4',
      '--collation-server=utf8mb4_unicode_ci',
      '--default-time-zone=+8:00',
      '--lower-case-table-names=1',
      '--explicit_defaults_for_timestamp=true',
      '--server-id=1',
      '--log-bin=mysql-bin',
      '--binlog-ignore-db=mysql',
      '--binlog-cache-size=256M',
      '--binlog-format=ROW',
      '--max_connections=2000'
    ]
    restart: always
    networks:
      - network_prd
    healthcheck:
      test: mysql --user=zmbdpprd -h127.0.0.1 --password='Hf@173503494' -e "SELECT 1;"
      start_period: 30s
      interval: 10s
      timeout: 5s
      retries: 10
    environment:
      TZ: Asia/Shanghai
      MYSQL_ROOT_PASSWORD: Hf@173503494
    ulimits:
      nproc: 65535
      nofile:
        soft: 20000
        hard: 40000
    logging:
      options:
        max-size: "10m"
        max-file: "3"
  scaffold-ai-assistant-redis01:
    container_name: scaffold-ai-assistant-redis01
    image: crpi-otuh3k08p4yxr3tv.cn-shanghai.personal.cr.aliyuncs.com/zmbdp-infra/rebloom:latest
    ports:
      - "6380:6380"
      - "16380:16380"
    volumes:
      - ./redis/conf/redis01.conf:/usr/local/etc/redis/redis.conf
      - ../data/scaffold-ai-assistantdata/redis01/data:/data
    command: redis-server /usr/local/etc/redis/redis.conf
    restart: always
    networks:
      - network_prd
    healthcheck:
      test: [ "CMD", "redis-cli","-p","6380", "ping" ]
      start_period: 3s
      interval: 3s
      timeout: 5s
      retries: 3
    logging:
      options:
        max-size: "10m"
        max-file: "3"

  scaffold-ai-assistant-redis02:
    container_name: scaffold-ai-assistant-redis02
    image: crpi-otuh3k08p4yxr3tv.cn-shanghai.personal.cr.aliyuncs.com/zmbdp-infra/rebloom:latest
    ports:
      - "6381:6381"
      - "16381:16381"
    volumes:
      - ./redis/conf/redis02.conf:/usr/local/etc/redis/redis.conf
      - ../data/scaffold-ai-assistantdata/redis02/data:/data
    command: redis-server /usr/local/etc/redis/redis.conf
    restart: always
    networks:
      - network_prd
    healthcheck:
      test: [ "CMD", "redis-cli","-p","6381", "ping" ]
      start_period: 3s
      interval: 3s
      timeout: 5s
      retries: 3
    logging:
      options:
        max-size: "10m"
        max-file: "3"

  scaffold-ai-assistant-redis03:
    container_name: scaffold-ai-assistant-redis03
    image: crpi-otuh3k08p4yxr3tv.cn-shanghai.personal.cr.aliyuncs.com/zmbdp-infra/rebloom:latest
    # 普通版本 redis 镜像
    #    image: redis:7.0.15
    ports:
      - "6382:6382"
      - "16382:16382"
    volumes:
      - ./redis/conf/redis03.conf:/usr/local/etc/redis/redis.conf
      - ../data/scaffold-ai-assistantdata/redis03/data:/data
    command: redis-server /usr/local/etc/redis/redis.conf
    restart: always
    networks:
      - network_prd
    healthcheck:
      test: [ "CMD", "redis-cli","-p","6382", "ping" ]
      start_period: 3s
      interval: 3s
      timeout: 5s
      retries: 3
    logging:
      options:
        max-size: "10m"
        max-file: "3"
  scaffold-ai-assistant-nacos01:
    container_name: scaffold-ai-assistant-nacos01
    image: crpi-otuh3k08p4yxr3tv.cn-shanghai.personal.cr.aliyuncs.com/zmbdp-infra/nacos-server:v2.2.2
    environment:
      - MODE=cluster
      - JVM_XMS=512m
      - JVM_XMX=512m
      - JVM_XMN=256m
      - NACOS_APPLICATION_PORT=8854
      - SPRING_DATASOURCE_PLATFORM=mysql
      - MYSQL_SERVICE_HOST=你的云服务器1内网ip/你的虚拟机1内网ip
      - MYSQL_SERVICE_PORT=3308
      - MYSQL_SERVICE_DB_NAME=scaffold-ai-assistant_nacos_prd
      - MYSQL_SERVICE_USER=zmbdpprd
      - MYSQL_SERVICE_PASSWORD=Hf@173503494
      - NACOS_SERVER_IP=你的云服务器1内网ip/你的虚拟机1内网ip
      - NACOS_SERVERS=你的云服务器1内网ip/你的虚拟机1内网ip:8854 你的云服务器1内网ip/你的虚拟机1内网ip:8856 你的云服务器2内网ip/你的虚拟机2内网ip:8858
    volumes:
      - ../data/scaffold-ai-assistantdata/nacos01/logs/:/home/nacos/logs
      - ../data/scaffold-ai-assistantdata/nacos01/tomcatlogs/:/home/bit/nacos/tomcat/logs/
      - ./nacos/conf/application.properties:/home/nacos/conf/application.properties
    ports:
      - "8854:8854"
      - "9854:9854"
      - "9855:9855"
    restart: always
    networks:
      - network_prd
    depends_on:
      scaffold-ai-assistant-mysql-master:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8854/nacos" ]
      start_period: 30s
      interval: 10s
      timeout: 10s
      retries: 10
    logging:
      options:
        max-size: "10m"
        max-file: "3"
  scaffold-ai-assistant-nacos02:
    container_name: scaffold-ai-assistant-nacos02
    image: crpi-otuh3k08p4yxr3tv.cn-shanghai.personal.cr.aliyuncs.com/zmbdp-infra/nacos-server:v2.2.2
    environment:
      - MODE=cluster
      - JVM_XMS=512m
      - JVM_XMX=512m
      - JVM_XMN=256m
      - NACOS_APPLICATION_PORT=8856
      - SPRING_DATASOURCE_PLATFORM=mysql
      - MYSQL_SERVICE_HOST=你的云服务器1内网ip/你的虚拟机1内网ip
      - MYSQL_SERVICE_PORT=3308
      - MYSQL_SERVICE_DB_NAME=scaffold-ai-assistant_nacos_prd
      - MYSQL_SERVICE_USER=zmbdpprd
      - MYSQL_SERVICE_PASSWORD=Hf@173503494
      - NACOS_SERVER_IP=你的云服务器1内网ip/你的虚拟机1内网ip
      - NACOS_SERVERS=你的云服务器1内网ip/你的虚拟机1内网ip:8854 你的云服务器1内网ip/你的虚拟机1内网ip:8856 你的云服务器2内网ip/你的虚拟机2内网ip:8858
    volumes:
      - ../data/scaffold-ai-assistantdata/nacos02/logs/:/home/nacos/logs
      - ../data/scaffold-ai-assistantdata/nacos02/tomcatlogs/:/home/bit/nacos/tomcat/logs/
      - ./nacos/conf/application.properties:/home/nacos/conf/application.properties
    ports:
      - "8856:8856"
      - "9856:9856"
      - "9857:9857"
    restart: always
    networks:
      - network_prd
    depends_on:
      scaffold-ai-assistant-mysql-master:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8856/nacos" ]
      start_period: 30s
      interval: 5s
      timeout: 3s
      retries: 10
    logging:
      options:
        max-size: "10m"
        max-file: "3"
  scaffold-ai-assistant-rabbitmq01:
    image: crpi-otuh3k08p4yxr3tv.cn-shanghai.personal.cr.aliyuncs.com/zmbdp-infra/rabbitmq:3.12.6-management
    container_name: scaffold-ai-assistant-rabbitmq01
    restart: always
    hostname: scaffold-ai-assistant-rabbitmq01
    extra_hosts:
      - "scaffold-ai-assistant-rabbitmq02:你的云服务器2内网ip/你的虚拟机2内网ip"
    environment:
      RABBITMQ_ERLANG_COOKIE: 'BITECOOKIE'
      RABBITMQ_NODE_PORT: 5673
      RABBITMQ_NODENAME: "scaffold-ai-assistant-rabbitmq01"
      # 用户名
      RABBITMQ_DEFAULT_USER: zmbdp
      # 密码
      RABBITMQ_DEFAULT_PASS: Hf@173503494
    ports:
      - "4369:4369"
      - "5673:5673"
      - "15673:15673"
      - "25673:25673"
    volumes:
      - ./rabbitmq/conf/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf
      - ../data/scaffold-ai-assistantdata/rabbitmq01/log:/var/log/rabbitmq
      - ../data/scaffold-ai-assistantdata/rabbitmq01/data:/var/lib/rabbitmq
    networks:
      - network_prd
    healthcheck:
      test: [ "CMD", "rabbitmqctl", "status" ]
      interval: 10s
      timeout: 10s
      retries: 10
    logging:
      options:
        max-size: "10m"
        max-file: "3"
  scaffold-ai-assistant-web-prd01:
    image: crpi-otuh3k08p4yxr3tv.cn-shanghai.personal.cr.aliyuncs.com/zmbdp-infra/nginx:1.24.0
    container_name: scaffold-ai-assistant-web-prd01
    restart: always
    networks:
      - network_prd
    ports:
      - "8666:80"
    volumes:
      - ./nginx/conf/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/web/dist:/data/scaffold-ai-assistant/web/dist
    ulimits:
      nproc: 65535
      nofile:
        soft: 20000
        hard: 40000
    logging:
      options:
        max-size: "10m"
        max-file: "3"

  # ==================== 链路追踪 SkyWalking ====================
  scaffold-ai-assistant-skywalking-oap:
    container_name: scaffold-ai-assistant-skywalking-oap
    build:
      context: ../../skywalking
      dockerfile: Dockerfile
    image: crpi-otuh3k08p4yxr3tv.cn-shanghai.personal.cr.aliyuncs.com/zmbdp-infra/skywalking-oap:9.7.0-mysql
    ports:
      - "11800:11800"  # gRPC 端口（Agent 上报数据）
      - "12800:12800"  # HTTP 端口（UI 查询数据）
    environment:
      TZ: Asia/Shanghai
      SW_STORAGE: mysql
      SW_JDBC_URL: jdbc:mysql://scaffold-ai-assistant-mysql-master:3306/scaffold-ai-assistant_skywalking_prd?serverTimezone=Asia/Shanghai&characterEncoding=utf8
      SW_DATA_SOURCE_USER: zmbdpprd
      SW_DATA_SOURCE_PASSWORD: Hf@173503494
      SW_HEALTH_CHECKER: default
      SW_TELEMETRY: prometheus
      JAVA_OPTS: -Xms1g -Xmx1g
    volumes:
      - ../data/scaffold-ai-assistantdata/skywalking/oap/logs:/skywalking/logs
    restart: always
    networks:
      - network_prd
    depends_on:
      scaffold-ai-assistant-mysql-master:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:12800/internal/l7check || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    logging:
      options:
        max-size: "10m"
        max-file: "3"

  scaffold-ai-assistant-skywalking-ui:
    container_name: scaffold-ai-assistant-skywalking-ui
    image: crpi-otuh3k08p4yxr3tv.cn-shanghai.personal.cr.aliyuncs.com/zmbdp-infra/skywalking-ui:9.7.0
    ports:
      - "8080:8080"
    environment:
      TZ: Asia/Shanghai
      SW_OAP_ADDRESS: http://scaffold-ai-assistant-skywalking-oap:12800
      SW_ZIPKIN_ADDRESS: http://scaffold-ai-assistant-skywalking-oap:9412
    restart: always
    networks:
      - network_prd
    depends_on:
      scaffold-ai-assistant-skywalking-oap:
        condition: service_healthy
    logging:
      options:
        max-size: "10m"
        max-file: "3"

  # ==================== 服务监控 Prometheus + Grafana ====================
  scaffold-ai-assistant-prometheus:
    container_name: scaffold-ai-assistant-prometheus
    image: crpi-otuh3k08p4yxr3tv.cn-shanghai.personal.cr.aliyuncs.com/zmbdp-infra/prometheus:v2.48.0
    user: "0:0"
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./prometheus/rules:/etc/prometheus/rules
      - ../data/scaffold-ai-assistantdata/prometheus/data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=7d'
      - '--storage.tsdb.retention.size=5GB'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'
    restart: always
    # Prd 环境：服务部署在 Docker 容器，使用 Docker 网络通信
    networks:
      - network_prd
    healthcheck:
      test: [ "CMD", "wget", "-q", "--spider", "http://localhost:9090/-/healthy" ]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      options:
        max-size: "10m"
        max-file: "3"

  scaffold-ai-assistant-grafana:
    container_name: scaffold-ai-assistant-grafana
    image: crpi-otuh3k08p4yxr3tv.cn-shanghai.personal.cr.aliyuncs.com/zmbdp-infra/grafana:10.2.2
    user: "0:0"
    ports:
      - "3000:3000"
    environment:
      TZ: Asia/Shanghai
      GF_SECURITY_ADMIN_USER: zmbdpprd
      GF_SECURITY_ADMIN_PASSWORD: Hf@173503494
      GF_INSTALL_PLUGINS: grafana-clock-panel,grafana-simple-json-datasource,grafana-piechart-panel
      GF_DEFAULT_LOCALE: zh-Hans
    volumes:
      - ../data/scaffold-ai-assistantdata/grafana/data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    restart: always
    networks:
      - network_prd
    depends_on:
      - scaffold-ai-assistant-prometheus
    healthcheck:
      test: [ "CMD", "wget", "-q", "--spider", "http://localhost:3000/api/health" ]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      options:
        max-size: "10m"
        max-file: "3"

  scaffold-ai-assistant-alertmanager:
    container_name: scaffold-ai-assistant-alertmanager
    image: crpi-otuh3k08p4yxr3tv.cn-shanghai.personal.cr.aliyuncs.com/zmbdp-infra/alertmanager:v0.26.0
    user: "0:0"
    ports:
      - "9093:9093"
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml
      - ../data/scaffold-ai-assistantdata/alertmanager/data:/alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    restart: always
    networks:
      - network_prd
    healthcheck:
      test: [ "CMD", "wget", "-q", "--spider", "http://localhost:9093/-/healthy" ]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      options:
        max-size: "10m"
        max-file: "3"

  # ==================== 定时任务调度 XXL-JOB ====================
  scaffold-ai-assistant-xxljob-admin:
    container_name: scaffold-ai-assistant-xxljob-admin
    image: crpi-otuh3k08p4yxr3tv.cn-shanghai.personal.cr.aliyuncs.com/zmbdp-infra/xxl-job-admin:2.4.2
    ports:
      - "8081:8080"
    environment:
      TZ: Asia/Shanghai
      PARAMS: >-
        --spring.datasource.url=jdbc:mysql://scaffold-ai-assistant-mysql-master:3306/scaffold-ai-assistant_xxljob_prd?useUnicode=true&characterEncoding=UTF-8&autoReconnect=true&serverTimezone=Asia/Shanghai
        --spring.datasource.username=zmbdpprd
        --spring.datasource.password=Hf@173503494
        --xxl.job.accessToken=scaffold-ai-assistant_prd
        --server.servlet.context-path=/xxl-job-admin
    volumes:
      - ../data/scaffold-ai-assistantdata/xxljob/logs:/data/applogs
    restart: always
    networks:
      - network_prd
    depends_on:
      scaffold-ai-assistant-mysql-master:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/xxl-job-admin" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    logging:
      options:
        max-size: "10m"
        max-file: "3"

  # ==================== Milvus 向量数据库（standalone 模式，生产单节点） ====================
  # Milvus 依赖 etcd（元数据存储）和 minio（对象存储），三者必须一起部署
  # 镜像版本与 milvus-sdk-java 2.4.5 对齐
  scaffold-ai-assistant-milvus-etcd:
    container_name: scaffold-ai-assistant-milvus-etcd
    image: crpi-otuh3k08p4yxr3tv.cn-shanghai.personal.cr.aliyuncs.com/zmbdp-infra/etcd:v3.5.5
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - ../data/scaffold-ai-assistantdata/milvus/etcd:/etcd
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    restart: always
    networks:
      - network_prd
    logging:
      options:
        max-size: "10m"
        max-file: "3"

  scaffold-ai-assistant-milvus-minio:
    container_name: scaffold-ai-assistant-milvus-minio
    image: crpi-otuh3k08p4yxr3tv.cn-shanghai.personal.cr.aliyuncs.com/zmbdp-infra/minio:RELEASE.2023-03-20T20-16-18Z
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    volumes:
      - ../data/scaffold-ai-assistantdata/milvus/minio:/minio_data
    command: minio server /minio_data
    restart: always
    networks:
      - network_prd
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
      interval: 30s
      timeout: 20s
      retries: 3
    logging:
      options:
        max-size: "10m"
        max-file: "3"

  scaffold-ai-assistant-milvus:
    container_name: scaffold-ai-assistant-milvus
    image: crpi-otuh3k08p4yxr3tv.cn-shanghai.personal.cr.aliyuncs.com/zmbdp-infra/milvus:v2.4.5
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: scaffold-ai-assistant-milvus-etcd:2379
      MINIO_ADDRESS: scaffold-ai-assistant-milvus-minio:9000
    ports:
      - "19530:19530"
      - "9091:9091"
    volumes:
      - ../data/scaffold-ai-assistantdata/milvus/milvus:/var/lib/milvus
    depends_on:
      - scaffold-ai-assistant-milvus-etcd
      - scaffold-ai-assistant-milvus-minio
    restart: always
    networks:
      - network_prd
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9091/healthz" ]
      interval: 30s
      start_period: 90s
      timeout: 20s
      retries: 3
    logging:
      options:
        max-size: "10m"
        max-file: "3"

networks:
  network_prd: