# XXL-JOB 执行器配置
xxl:
  job:
    admin:
      # 调度中心地址
      # Dev 环境：组件在云服务器，服务在本地，通过 XShell 隧道连接
      # XShell 需开启本地端口转发：Local 127.0.0.1:8081 -> 云服务器内网ip:8081
      # 这样本地服务访问 127.0.0.1:8081 即可到达云服务器上的 XXL-JOB 调度中心
      addresses: http://127.0.0.1:8081/xxl-job-admin
    executor:
      # 执行器 AppName（需与调度中心配置一致）
      appname: ${spring.application.name}-executor
      # 执行器注册地址：Dev 环境关键配置！
      # 调度中心运行在 Docker 容器内，容器内的 127.0.0.1 是容器自身，不是宿主机
      # host.docker.internal 已在 docker-compose extra_hosts 中配置，指向宿主机网关
      # 链路：调度中心容器 -> host.docker.internal:{port} -> 宿主机XShell隧道 -> 本地{port} -> 执行器
      # address 和 port 不在此处指定，由各服务自身的 Nacos 配置覆盖
      # 例如在 zmbdp-xxx-service-dev.yaml 中添加：
      #   xxl:
      #     job:
      #       executor:
      #         port: 99xx
      #         address: http://host.docker.internal:99xx
      # 同时在 XShell 新增对应的 Remote 隧道：0.0.0.0:99xx -> 127.0.0.1:99xx
      address:
      ip:
      port: -1
      # 访问令牌（需与调度中心配置一致）
      accessToken: scaffold-ai-assistant_dev
      # 执行器日志路径
      logpath: /data/applogs/xxl-job/executor
      # 执行器日志保留天数（-1 永不清理）
      logretentiondays: 30

# 布隆过滤器 XXL-JOB 降级配置
# 正常情况由 XXL-JOB 调度中心接管，以下为降级兜底开关
bloom:
  filter:
    fallback:
      # 是否启用 Spring Scheduled 降级（默认 false，由 XXL-JOB 接管）
      enabled: false
      # 降级 CRON 表达式（仅 enabled=true 时生效）
      cron: 0 0 4 * * ?