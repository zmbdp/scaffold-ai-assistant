server:
  port: 18083
# 微信小程序
wx:
  applet:
    app-id: # 微信小程序 appId
    app-secret: # 微信小程序 appSecret

# XXL-JOB 执行器端口覆盖
# 每个服务使用独立端口，避免多服务本地同时运行时端口冲突
# 需在 XShell 新增 Remote 隧道：0.0.0.0:9983 -> 127.0.0.1:9983
xxl:
  job:
    executor:
      port: 9983
      address: http://host.docker.internal:9983

# ==================== C端 AI 对话配置 ====================
scaffold:
  portal:
    # 系统提示词文件路径（支持 classpath: 或 file: 前缀）
    system-prompt-path: classpath:prompt/system-prompt.txt
    # RAG 上下文最大长度（字符数），超出则按 score 降序截断低分文档
    context-max-length: 8000
    # WebClient 调用 chat-service SSE 端点的超时时间（毫秒），超时返回错误帧
    webclient-timeout: 60000