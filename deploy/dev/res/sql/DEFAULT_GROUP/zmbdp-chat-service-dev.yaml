# ==================== chat-service 服务特有配置（dev 环境） ====================
# AI 模型相关配置 → share-ai-model-dev.yaml
# 知识库/Milvus 相关配置 → share-knowledge-dev.yaml
# 本文件仅保留服务端口、xxl-job、日志级别等服务特有配置

server:
  port: 18084

# ==================== xxl-job 执行器配置（覆盖 share-xxljob-dev.yaml） ====================
# XXL-JOB 执行器端口覆盖
# 每个服务使用独立端口，避免多服务本地同时运行时端口冲突
# 需在 XShell 新增 Remote 隧道：0.0.0.0:9984 -> 127.0.0.1:9984
xxl:
  job:
    executor:
      appname: zmbdp-chat-service-executor
      # chat-service 执行器端口
      port: 9984
      address: http://host.docker.internal:9984

# ==================== 日志级别配置（调试图文对话空响应问题） ====================
# 启用 Spring AI / DashScope 的 HTTP 请求响应日志，便于定位"空响应"根因
# 排查完毕后可删除此段配置或改为 INFO
logging:
  level:
    # Spring AI 核心包
    org.springframework.ai: DEBUG
    # DashScope SDK（HTTP 请求/响应详情）
    com.alibaba.cloud.ai.dashscope: DEBUG
    # Reactor Netty HTTP 客户端（流式调用底层）
    reactor.netty.http.client: DEBUG