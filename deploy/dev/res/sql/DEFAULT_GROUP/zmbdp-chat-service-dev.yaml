server:
  port: 18084

# ==================== Spring AI 框架配置 ====================
spring:
  web:
    client:
      # Spring RestClient 连接超时：建立 TCP 连接的最长等待时间
      # 作用范围：Spring AI DashScope 的 Embedding / Chat / Rerank 等同步 HTTP 请求
      connect-timeout: 30s
      # Spring RestClient 读取超时：等待服务端返回响应的最长时间
      # 作用范围：同上，Embedding 向量化大文本时需适当放宽
      read-timeout: 180s
  ai:
    # 通义千问模型配置（DashScope）
    dashscope:
      api-key: # 你的通义千问 API Key，不硬编码）
      chat:
        model: deepseek-v4-flash
        # model: glm-5.2
        options:
          temperature: 0.7
      embedding:
        options:
          model: qwen3.7-text-embedding
      # 重排序模型配置
      # 配置前缀必须为 spring.ai.dashscope.rerank，由 DashScopeRerankAutoConfiguration 自动装配 RerankModel Bean
      rerank:
        options:
          model: qwen3-rerank
    # 多模型管理配置
    # 启动时由 ModelServiceImpl @PostConstruct 解析，为每个 enabled=true 的模型构建 ChatClient 实例
    # 注意：default-model 用 kebab-case，因为 "default" 是 Java 关键字不能直接作为字段名
    models:
      # 纯文本模型
      - type: TEXT_ONLY
        name: deepseek-v4-flash
        # name: glm-5.2
        provider: dashscope
        enabled: true
        default-model: true
        capabilities: [TEXT]
      # 视觉多模态模型
      - type: TEXT_AND_IMAGE
        name: qwen-vl-max
        # name: glm-5.2
        provider: dashscope
        enabled: true
        default-model: true
        capabilities: [TEXT, IMAGE]
    # Milvus 向量数据库配置（Spring AI 标准前缀）
    milvus:
      host: 127.0.0.1
      port: 19530
      database-name: default
      collection-name: scaffold_knowledge
      # 输出维度
      embedding-dimension: 1024
      index-type: HNSW
      metric-type: IP
      index-parameters:
        efConstruction: 200
        M: 16
      query-parameters:
        efRuntime: 100
      # 维度不一致时是否自动重建集合（启动时检查现有集合维度，与配置不一致时自动 drop+重建）
      # 开发/测试环境推荐 true：切换 Embedding 模型导致维度变化时自动重建，避免插入/检索失败
      # 生产环境推荐 false：避免误删数据，由管理员手动处理
      auto-rebuild-on-dimension-mismatch: true

# ==================== RAG 检索参数配置 ====================
scaffold:
  rag:
    # 默认检索数量，范围1-20
    top-k: 5
    # 上下文最大长度（字符）
    context-max-length: 8000
    # 对话历史轮数
    memory-rounds: 5
    # 重排序超时（毫秒），超时降级为 Milvus 原始排序
    rerank-timeout: 5000
  tool:
    # 工具调用超时（秒）
    timeout: 30
  # 定时任务线程池配置
  scheduler:
    pool-size: 5
    thread-name-prefix: "scheduled-"

# ==================== 知识库路径配置（供 Agent 工具使用） ====================
knowledge:
  # 本地开发时填项目实际绝对路径（Windows 用正斜杠或双反斜杠）
  base-path: d:/GitHub/frameworkjava
  # 路径白名单支持动态调整，范围包含整个项目
  allowed-paths:
    - d:/GitHub/frameworkjava
  # 禁止访问的路径列表
  path-blacklist:
    - .git
    - /etc
    - /tmp
  # 最大文件大小（字节），默认10MB
  max-file-size: 10485760
  # ==================== 启动时自动知识同步 ====================
  # 服务启动完成后自动触发一次知识同步（异步执行，不阻塞启动；内部含 Redisson 分布式锁，多实例安全）
  # 关闭场景：调试启动速度、临时排查问题、向量库已由其他实例同步完成
  startup-sync:
    # 是否启用启动时同步（true=启用，false=禁用）
    enabled: true
    # 是否强制全量同步（false=增量同步仅处理变更文件【推荐】；true=全量重新向量化，适用于切换 Embedding 模型后重建向量库）
    force: false
    # 启动同步前的等待时间（毫秒），等待 Milvus 集合加载和 Embedding 模型就绪，避免首次调用失败
    delay-ms: 3000

# ==================== xxl-job 执行器配置（覆盖 share-xxljob-dev.yaml） ====================
# XXL-JOB 执行器端口覆盖
# 每个服务使用独立端口，避免多服务本地同时运行时端口冲突
# 需在 XShell 新增 Remote 隧道：0.0.0.0:9984 -> 127.0.0.1:9984
xxl:
  job:
    executor:
      appname: zmbdp-chat-service-executor
      # chat-service 执行器端口
      port: 9984
      address: http://host.docker.internal:9984

# ==================== 日志级别配置（调试图文对话空响应问题） ====================
# 启用 Spring AI / DashScope 的 HTTP 请求响应日志，便于定位"空响应"根因
# 排查完毕后可删除此段配置或改为 INFO
logging:
  level:
    # Spring AI 核心包
    org.springframework.ai: DEBUG
    # DashScope SDK（HTTP 请求/响应详情）
    com.alibaba.cloud.ai.dashscope: DEBUG
    # Reactor Netty HTTP 客户端（流式调用底层）
    reactor.netty.http.client: DEBUG