# ==================== Spring Boot Actuator 监控配置 ====================
management:
  # 端点配置
  endpoints:
    web:
      exposure:
        # 暴露的端点（生产环境建议只暴露 prometheus 和 health）
        include: prometheus,health,info,metrics
      base-path: /actuator
      # 跨域配置（如果需要）
      cors:
        allowed-origins: "*"
        allowed-methods: GET,POST

  # 健康检查配置
  endpoint:
    health:
      # 显示详细健康信息
      show-details: always
      probes:
        # 启用 Kubernetes 探针
        enabled: true
    prometheus:
      enabled: true

  # 健康检查指示器
  health:
    redis:
      enabled: true
    db:
      enabled: true
    rabbit:
      enabled: true

  # 指标配置
  metrics:
    # Prometheus 导出配置
    export:
      prometheus:
        enabled: true
        # 采集间隔（与 Prometheus 配置一致）
        step: 15s
        # 包含指标描述
        descriptions: true

    # 全局标签
    tags:
      application: ${spring.application.name}
      environment: dev
      cluster: frameworkjava

    # 启用的指标
    enable:
      # JVM 指标
      jvm: true
      # 进程指标
      process: true
      # 系统指标
      system: true
      # Tomcat 指标
      tomcat: true
      # Logback 指标
      logback: true
      # HikariCP 连接池指标
      hikaricp: true

    # 分布配置（响应时间分布）
    distribution:
      percentiles-histogram:
        # HTTP 请求响应时间分布
        http.server.requests: true
      slo:
        # 响应时间 SLO
        http.server.requests: 100ms,200ms,500ms,1s,2s,3s,5s

  # Micrometer Tracing 配置
  tracing:
    sampling:
      # 采样率 100%
      probability: 1.0

# ==================== SkyWalking 配置（可选）====================
# 注意：如果使用 SkyWalking Agent，这些配置会被 Agent 参数覆盖
# 这里仅作为参考配置，实际以 Agent 参数为准
skywalking:
  agent:
    # 服务名称
    service_name: ${spring.application.name}
    # OAP 服务地址
    collector:
      backend_service: localhost:11800
    # 采样率（-1 表示全量采集，生产环境建议设置为 1000-5000）
    sample_n_per_3_secs: -1
    # 日志级别
    logging:
      level: INFO
    # 追踪配置
    trace:
      # 忽略的端点（不追踪）
      ignore_path: /actuator/**,/health,/metrics,/favicon.ico
    # Span 限制
    span_limit_per_segment: 300