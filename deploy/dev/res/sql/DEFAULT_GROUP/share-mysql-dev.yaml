    hikari:
      # 连接池大小配置（根据实际并发量调整）
      # 最大连接数，建议：CPU核心数 * 2 + 磁盘数
      maximum-pool-size: 20
      # 最小空闲连接数，建议：maximum-pool-size 的 1/4
      minimum-idle: 5

      # 连接超时配置
      # 获取连接超时时间（毫秒）
      connection-timeout: 30000
      # 空闲连接超时时间（毫秒，10分钟）
      idle-timeout: 600000
      # 连接最大生命周期（毫秒，30分钟）
      max-lifetime: 1800000

      # 性能优化配置
      # 连接泄漏检测（毫秒，生产环境建议开启）
      leak-detection-threshold: 60000
      # 连接池名称（便于监控和日志追踪）
      pool-name: FrameworkJavaHikariCP